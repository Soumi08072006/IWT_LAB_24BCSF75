<h1>Q9.Write a function to check whether a no. is an armstrong or not</h1>
<script>
	function isArmstrong(num)
	{
		let temp=num;
		let sum=0;
		let ndig=num.toString().length;
		while(temp>0)
		{
			let digit=temp%10;
			sum=sum+Math.pow(digit,ndig);
			temp=Math.floor(temp/10);
			
		}
		return sum==num;
	}
	let number =parseInt(prompt("Enter a number:"));
	if(isArmstrong(number))
	{
		document.write(number+"is an Armstrong number");
	}
	else
	{
		document.write(number+"is not an Armstrong number");
	}
		
		
			
</script>

</body>
