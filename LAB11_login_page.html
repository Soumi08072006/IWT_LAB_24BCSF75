<html>
<head>
<title>Login Page</title>
<style>
body
{
	font-family:Arial;
	background-color:white;
}
.container
{
	display:flex;
	flex-direction:column;
	justify-content:center;
	align-items:center;
	height:100vh;
	

}
input[type=text],input[type=password]
{
	width:90%;
	padding:10px;
	margin:10px;
	border:1px solid gray;
	border-radius:5px;
}
button
{
	width:90%;
	padding:10px;
	background-color:green;
	color:white;
	border:none;
	border-radius:5px;
	font-size:18px;
}
.remember
{
	margin:10px;
}
.card
{
	background-color:white;
	padding:30px;
	width:300px;
	border:1px solid gray;
	border-radius:10px;
	box-shadow:0px 0px 10px gray;
	text-align:center;
}
</style>
</head>
<body>
<div class="container">
	<div class="card">
<h1>Login</h1>
<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
	<div class="remember">
<input type="checkbox">Remember Me
</div>
	<button>Login</button>
</div>
</div>
</body>
</html>
