<html>
<head>
<title>Personal Profile Card</title>

<style>

body{
font-family: Arial, sans-serif;
background-color: lightgray;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.profile-card{
background: white;
width: 300px;
padding: 20px;
border-radius: 10px;
box-shadow: 0px 4px 8px gray;
text-align: center;
}

.profile-card img{
width: 120px;
height: 120px;
border-radius: 50%;
border: 4px solid green;
margin-bottom: 15px;
}

.profile-card h2{
margin: 10px 0px;
color: black;
}

.profile-card p{
font-size: 14px;
color: dimgray;
margin-bottom: 15px;
}

.contact{
font-size: 14px;
color: black;
}

</style>
</head>

<body>

<div class="profile-card">

<img src="profile.jpg" alt="Profile Picture">

<h2>John Doe</h2>

<p>A passionate web developer who loves building interactive websites.</p>

<div class="contact">
<p>Email: john.doe@example.com</p>
<p>Phone: +91-9876543210</p>
</div>

</div>

</body>
</html>
