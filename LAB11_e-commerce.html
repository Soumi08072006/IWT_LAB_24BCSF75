<style>
body
{
	font-family:Arial;
	background:black;
}
.container
{
	text-align:center;
}
.product-row
{
	display:flex;
	justify-content:space-between;
	padding:20px;
}
.card
{
	background:pink;
	width:18%;
	padding:10px;
	border-radius:8px;
	box-shadow: 0 2px 5px gray;
}
.card img
{
	width:100%;
}
button
{
	background:blue;
	color:white;
	border:none;
	padding:10px;
	border-radius:5px;
	cursor:pointer;
}
.card:hover
{
	background:lightpink;
	transform:scale(1.05);
}
button:hover
{
	background:gray;
}
</style>
</head>
