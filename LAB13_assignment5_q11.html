<h2>Q11.Write a function reverseArray(arr) that reverses the elements of 
an array without using the built in reverse() method.</h2>
<script>
	function reverseArray(arr)
	{
		let reversed =[];
		for(let i=arr.length-1;i>=0;i--)
		{
			reversed.push(arr[i]);
		}
		return reversed;
	}
	let numbers=[1,5,8,9,7,4];
	let result=reverseArray(numbers);
	document.write("The reversed array is:"+result);
</script>
</body>
