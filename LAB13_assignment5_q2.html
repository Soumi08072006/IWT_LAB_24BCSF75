<!DOCTYPE html>
<html>
<head>
    <title>Assignment5_q2</title>
</head>
<body bgcolor="white" text="black">
    <h1>q2. Write a program to print factorial of a number</h1>
    <script>
        var a = parseInt(prompt("Enter a number to find its factorial"));
        let fact = 1;
        for (let i = 1; i <= a; i++) {
            fact = fact * i;
        }
        document.write("Factorial of the number is " + fact);
    </script>
</body>
</html>
